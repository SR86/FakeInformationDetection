{% extends "base.html" %}

{% block title %}找回密码 - Fake Information Detection{% endblock %}

{% block content %}
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }

  .video-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.4);
    z-index: -1;
  }

  .recover-container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;  /* 从上方对齐 */
  padding-top: 80px;        /* 往下偏移一点，避免贴顶 */
}


  .card {
    width: 360px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);

  }

  .card-body {
    padding: 2.5rem 2rem;
  }

  h3.card-title {
    margin-bottom: 2rem;
    font-weight: 700;
    color: #fff;
    text-align: center;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
  }

  label.form-label {
    font-weight: 600;
    color: #f2f2f2;
  }

  input.form-control {
    width: 80%;              /* 控制宽度 */
    margin: 0 auto;          /* 居中 */
    display: block;          /* 使 margin 生效 */
    border-radius: 8px;
    border: 1.8px solid #ced4da;
    padding: 10px 12px;
    background-color: rgba(255, 255, 255, 0.85);
    color: #000;
  }

  input.form-control::placeholder {
    color: #666;
  }

  input.form-control:focus {
    border-color: #007bff;
    box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
    outline: none;
  }

  button.btn-primary {
    width: 100%;
    border-radius: 8px;
    font-weight: 600;
    padding: 12px 0;
    background: linear-gradient(45deg, #0069d9, #0053ba);
    border: none;
    box-shadow: 0 4px 12px rgba(0, 105, 217, 0.4);
    transition: background 0.3s ease;
    margin-top: 5px;
  }

  button.btn-primary:hover {
    background: linear-gradient(45deg, #0053ba, #004299);
  }

  .text-center {
    margin-top: 1.25rem;
    font-size: 0.9rem;
    color: #eee;
    text-align: center;
  }

  .text-center a {
    color: #90cdf4;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }

  .text-center a:hover {
    color: #fff;
    text-decoration: underline;
  }

  .alert-danger {
    margin-top: 1rem;
    font-weight: 600;
    font-size: 0.9rem;
    color: #f8d7da;
    background-color: rgba(220, 53, 69, 0.1);
    border: 1px solid #f5c6cb;
    padding: 0.75rem 1rem;
    border-radius: 6px;
  }
</style>

<!-- 背景视频和遮罩 -->
<video autoplay muted loop class="video-bg">
  <source src="{{ url_for('static', filename='video/login_bg.webm') }}" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- 找回密码卡片 -->
<div class="recover-container">
  <div class="card shadow-sm">
    <div class="card-body">
      <h3 class="card-title">找回密码</h3>
      <form method="POST" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">用户名</label>
          <input type="text" id="username" name="username" class="form-control" placeholder="请输入用户名" required autofocus>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">注册邮箱</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="请输入注册邮箱" required>
        </div>
        <button type="submit" class="btn btn-primary">发送验证码</button>
      </form>

      <div class="text-center">
        <p><a href="{{ url_for('login') }}">返回登录</a></p>
      </div>

      {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
      {% endif %}
    </div>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const inputs = Array.from(document.querySelectorAll('input.form-control'));

    inputs.forEach((input, index) => {
      input.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') {
          event.preventDefault();  // 阻止默认提交
          const nextInput = inputs[index + 1];
          if (nextInput) {
            nextInput.focus();
          } else {
            // 如果没有下一个输入框，则查找并点击提交按钮
            const submitBtn = document.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.click();
          }
        }
      });
    });
  });
</script>
{% endblock %}
