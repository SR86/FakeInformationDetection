{% extends "base.html" %}

{% block title %}重置密码 - Fake Information Detection{% endblock %}

{% block content %}
<!-- 背景视频和遮罩 -->
<video autoplay muted loop class="video-bg">
  <source src="{{ url_for('static', filename='video/login_bg.webm') }}" type="video/mp4">
</video>
<div class="overlay"></div>

<style>
  /* 视频背景样式 */
  .video-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    object-fit: cover;
    z-index: -2;
  }

  /* 遮罩层样式 */
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.4);
    z-index: -1;
  }

  body {
    background: transparent;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  }

  .reset-container {
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    width: 360px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: #eee;
  }

  .card-body {
    padding: 2.5rem 2rem;
  }

  h3.card-title {
    margin-bottom: 2rem;
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  label.form-label {
    font-weight: 600;
    color: #ddd;
  }

  input.form-control {
    border-radius: 8px;
    border: 1.8px solid #ced4da;
    padding: 10px 12px;
    background-color: #fff;       /* 改为白色背景 */
    color: #333;                  /* 深色文字 */
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  input.form-control::placeholder {
    color: #999;                  /* 占位符颜色改深一点 */
  }

  input.form-control:focus {
    border-color: #007bff;
    box-shadow: 0 0 8px rgba(0,123,255,0.4);
    outline: none;
    background-color: #fff;       /* 聚焦时仍是白色 */
    color: #333;
  }

  button.btn-primary, button.btn-secondary {
    width: 100%;
    border-radius: 8px;
    font-weight: 600;
    padding: 12px 0;
    border: none;
    transition: background 0.3s ease;
    cursor: pointer;
  }

  button.btn-primary {
    background: linear-gradient(45deg, #0069d9, #0053ba);
    box-shadow: 0 4px 12px rgba(0,105,217,0.4);
    color: #fff;
  }
  button.btn-primary:hover {
    background: linear-gradient(45deg, #0053ba, #004299);
  }

  button.btn-secondary {
    background: #6c757d;
    color: #fff;
  }
  button.btn-secondary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  button.btn-secondary:not(:disabled):hover {
    background: #5a6268;
  }

  .alert-danger {
    margin-top: 1rem;
    font-weight: 600;
    font-size: 0.9rem;
    color: #ffdddd;
    background-color: #660000;
    border-radius: 6px;
    padding: 0.5rem 1rem;
  }
</style>

<div class="reset-container">
  <div class="card shadow-sm">
    <div class="card-body">
      <h3 class="card-title">重置密码</h3>
      <form method="POST">
        <div class="mb-3">
          <label for="code" class="form-label">验证码</label>
          <input type="text" id="code" name="code" class="form-control" required>
        </div>

        <button type="button" id="resend-btn" class="btn btn-secondary" disabled>重新发送验证码(60秒)</button>

        <div class="mb-3 mt-3">
          <label for="new_password" class="form-label">新密码</label>
          <input type="password" id="new_password" name="new_password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="confirm_password" class="form-label">确认密码</label>
          <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">重置密码</button>
      </form>

      {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
      {% endif %}
    </div>
  </div>
</div>

<script>
  // 倒计时逻辑，60秒内禁用“重新发送验证码”按钮
  let resendBtn = document.getElementById('resend-btn');
  let countdown = 60;

  function updateButton() {
      if (countdown === 0) {
          resendBtn.disabled = false;
          resendBtn.textContent = "重新发送验证码";
      } else {
          resendBtn.disabled = true;
          resendBtn.textContent = `重新发送验证码(${countdown}秒)`;
          countdown--;
          setTimeout(updateButton, 1000);
      }
  }

  updateButton();

  // 点击按钮时调用后端接口重新发送验证码
  resendBtn.addEventListener('click', function() {
      fetch('{{ url_for("resend_verification_code") }}', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
              username: "{{ session.get('reset_username', '') }}",
              email: "{{ session.get('reset_email', '') }}"
          })
      }).then(response => response.json())
        .then(data => {
          if (data.success) {
              alert("验证码已重新发送，请查收邮箱。");
              countdown = 60;
              updateButton();
          } else {
              alert("重新发送验证码失败：" + data.message);
          }
        })
        .catch(() => alert("网络错误，重新发送验证码失败。"));
  });
</script>
{% endblock %}
